[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# HTML Report
addopts = 
    --html=reports/test_report.html
    --self-contained-html
    --tb=short
    -v

# Playwright settings
asyncio_mode = auto

# Markers
markers =
    frontend: Frontend UI tests using Playwright
    backend: Backend API tests using requests
    smoke: Quick smoke tests — run first
    regression: Full regression suite
    auth: Authentication related tests
    trip: Trip creation related tests
    ai: AI itinerary generation tests
